name: R6RS Portable FFI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  Scheme-env-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          path: target
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install libgc-dev zlib1g-dev libffi-dev curl libx11-dev
      - name: Install scheme-env
        run: |
          curl https://raw.githubusercontent.com/ktakashi/scheme-env/master/bin/install.sh | bash
          echo "$HOME/.scheme-env/bin" >> $GITHUB_PATH
      - name: Install Implementations
        run: |
          scheme-env install sagittarius
          scheme-env install chez
      - name: Run test
        working-directory: target
        run: ./ci-test.sh

  Makefile-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          path: target
      - name: Install Implentations
        run: |
          sudo apt update
          sudo apt -y install curl guile-3.0 racket
      - name: Install Capy nightly
        run: |
          set -euo pipefail
          release_json="$(mktemp)"
          curl -fsSL https://codeberg.org/api/v1/repos/playXE/capy/releases/tags/nightly -o "$release_json"
          asset_url="$(python3 - "$release_json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as input:
              release = json.load(input)

          for asset in release["assets"]:
              name = asset.get("name", "")
              if name.endswith("x86_64-unknown-linux-gnu.tar.gz"):
                  print(asset["browser_download_url"])
                  break
          else:
              raise SystemExit("No Linux x86_64 Capy nightly asset found")
          PY
          )"
          mkdir -p "$HOME/.local/capy"
          curl -fsSL "$asset_url" -o /tmp/capy-nightly.tar.gz
          tar -xzf /tmp/capy-nightly.tar.gz -C "$HOME/.local/capy" --strip-components=2
          echo "$HOME/.local/capy" >> "$GITHUB_PATH"
      - name: Run test
        working-directory: target
        run: make guile racket capy
